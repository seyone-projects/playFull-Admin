name: Deploy Livez DEV

on:
  pull_request:
    types: [closed]
    branches: [ "develop" ]

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: CI=false npm run build:develop

      - name: Upload to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read
        env:
          SOURCE_DIR: dist
          AWS_S3_BUCKET: ${{ secrets.AWS_PLAY_FULL_DEV_S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_PLAY_FULL_DEV_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_PLAY_FULL_DEV_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1